services:
  router:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${IMAGE_TAG}
    container_name: lab-router
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - MASK=24
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0
    networks:
      lab_net:
        ipv4_address: ${ROUTER_IP_A}
    command: sh -c "ip addr add ${ROUTER_IP_B}/24 dev eth0; /usr/local/bin/entrypoint.sh bash"
    healthcheck:
      test: ["CMD", "ip", "addr", "show", "eth0"]
      interval: 5s
      timeout: 5s
      retries: 3
    tty: true

  client_a:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${IMAGE_TAG}
    container_name: lab-client-a
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY_IP=${ROUTER_IP_A}
      - MASK=24
    sysctls:
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0
    networks:
      lab_net:
        ipv4_address: ${CLIENT_A_IP}
    depends_on:
      router:
        condition: service_healthy
    tty: true

  client_b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${IMAGE_TAG}
    container_name: lab-client-b
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - GATEWAY_IP=${ROUTER_IP_B}
      - MASK=24
    sysctls:
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0
    networks:
      lab_net:
        ipv4_address: ${CLIENT_B_IP}
    depends_on:
      router:
        condition: service_healthy
    tty: true

networks:
  lab_net:
    ipam:
      config:
        - subnet: ${LAB_NETWORK_RANGE}
